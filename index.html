<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus objetivos do ano</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="conteudo-principal">
        <h2 class="titulo-principal">Meus Objetivos do ano</h2>
        <div class="botoes">
            
            <details class="botao">
                <summary>Aprender Chinês</summary>
                <div class="botaoaberto">
                    <p>Prazo de 2 anos</p>
                    <div class="timer-container">
                        <input type="number" placeholder="Min" class="input-tempo">
                        <div class="controles-timer">
                            <button onclick="iniciarTimer(this)">Iniciar</button>
                            <button onclick="pausarTimer(this)">Pausar</button>
                            <button onclick="resetarTimer(this)">Resetar</button>
                        </div>
                        <span class="display">00:00:00</span>
                    </div>
                    <div class="progresso-container">
                        <label>Progresso: <span class="percent-text">0%</span></label>
                        <input type="range" min="0" max="100" value="0" class="slider-progresso" oninput="atualizarProgresso(this)">
                    </div>
                    <button onclick="marcarConcluido(this)" class="botao-concluir">Concluir Objetivo</button>
                </div>
            </details>

            <details class="botao">
                <summary>Melhorar minha letra</summary>
                <div class="botaoaberto">
                    <p>Em progresso! só falta a velocidade na escrita</p>
                    <div class="timer-container">
                        <input type="number" placeholder="Min" class="input-tempo">
                        <div class="controles-timer">
                            <button onclick="iniciarTimer(this)">Iniciar</button>
                            <button onclick="pausarTimer(this)">Pausar</button>
                            <button onclick="resetarTimer(this)">Resetar</button>
                        </div>
                        <span class="display">00:00:00</span>
                    </div>
                    <div class="progresso-container">
                        <label>Progresso: <span class="percent-text">0%</span></label>
                        <input type="range" min="0" max="100" value="0" class="slider-progresso" oninput="atualizarProgresso(this)">
                    </div>
                    <button onclick="marcarConcluido(this)" class="botao-concluir">Concluir Objetivo</button>
                </div>
            </details>

            <details class="botao">
                <summary>Ler mais (Artigos e livros)</summary>
                <div class="botaoaberto">
                    <p>Preciso finalizar O Principe de Maquiavel</p>
                    <div class="timer-container">
                        <input type="number" placeholder="Min" class="input-tempo">
                        <div class="controles-timer">
                            <button onclick="iniciarTimer(this)">Iniciar</button>
                            <button onclick="pausarTimer(this)">Pausar</button>
                            <button onclick="resetarTimer(this)">Resetar</button>
                        </div>
                        <span class="display">00:00:00</span>
                    </div>
                    <div class="progresso-container">
                        <label>Progresso: <span class="percent-text">0%</span></label>
                        <input type="range" min="0" max="100" value="0" class="slider-progresso" oninput="atualizarProgresso(this)">
                    </div>
                    <button onclick="marcarConcluido(this)" class="botao-concluir">Concluir Objetivo</button>
                </div>
            </details>

        </div>
    </section>

    <script>
        function formatarTempo(segundosTotal) {
            const hor = Math.floor(segundosTotal / 3600);
            const min = Math.floor((segundosTotal % 3600) / 60);
            const seg = segundosTotal % 60;
            return `${String(hor).padStart(2, '0')}:${String(min).padStart(2, '0')}:${String(seg).padStart(2, '0')}`;
        }

        function iniciarTimer(botao) {
            const container = botao.closest('.timer-container');
            const input = container.querySelector('.input-tempo');
            const display = container.querySelector('.display');

            if (!container.tempoRestante) {
                const minutos = parseInt(input.value);
                if (isNaN(minutos) || minutos <= 0) {
                    alert("Por favor, insira uma quantidade de minutos.");
                    return;
                }
                container.tempoRestante = minutos * 60;
            }

            if (container.intervaloID) return;

            container.intervaloID = setInterval(() => {
                if (container.tempoRestante <= 0) {
                    clearInterval(container.intervaloID);
                    container.intervaloID = null;
                    display.innerText = "Concluído!";
                    return;
                }

                container.tempoRestante--;
                display.innerText = formatarTempo(container.tempoRestante);
            }, 1000);
        }

        function pausarTimer(botao) {
            const container = botao.closest('.timer-container');
            clearInterval(container.intervaloID);
            container.intervaloID = null;
        }

        function resetarTimer(botao) {
            const container = botao.closest('.timer-container');
            const display = container.querySelector('.display');
            const input = container.querySelector('.input-tempo');
            
            clearInterval(container.intervaloID);
            container.intervaloID = null;
            container.tempoRestante = null;
            display.innerText = "00:00:00";
            input.value = "";
        }

        function atualizarProgresso(slider) {
            const percentText = slider.parentElement.querySelector('.percent-text');
            percentText.innerText = `${slider.value}%`;
        }

        function marcarConcluido(botao) {
            const objetivo = botao.closest('.botao');
            objetivo.classList.toggle('concluido');

            if (objetivo.classList.contains('concluido')) {
                botao.innerText = "Desmarcar";
            } else {
                botao.innerText = "Concluir Objetivo";
            }
        }
    </script>
</body>
</html>
